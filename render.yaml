services:
  - type: web
    name: freelance-tracker
    env: node
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGHOST
        sync: false
      - key: PGPORT
        value: 5432
      - key: PGDATABASE
        value: postgres
      - key: PGUSER
        value: postgres
      - key: PGPASSWORD
        sync: false
